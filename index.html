<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <title>3D MIDI Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #canvas-container { width: 100vw; height: 100vh; }
    canvas { display: block; }

    #loading-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      color: #fff; font-family: sans-serif; font-size: 1.2rem;
      z-index: 100;
    }
    #loading-overlay.hidden { display: none; }

    #file-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0, 0, 10, 0.9);
      color: #fff; font-family: sans-serif;
      z-index: 50;
    }
    #file-overlay.hidden { display: none; }

    #drop-zone {
      width: 400px; height: 200px;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: rgba(255, 255, 255, 0.6);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    #drop-zone.drag-over {
      border-color: #4ecdc4;
      background: rgba(78, 205, 196, 0.1);
    }

    .sample-buttons {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px; margin-top: 24px; max-width: 600px;
    }
    .sample-btn {
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff; font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sample-btn:hover { background: rgba(255, 255, 255, 0.2); }

    #progress-bar-container {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 32px;
      background: rgba(0, 0, 0, 0.6);
      cursor: pointer;
      z-index: 30;
    }
    #progress-bar-container.hidden { display: none; }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6dd5fa, #8b9cf4);
      width: 0%;
      transition: width 0.1s linear;
    }
    #progress-time {
      position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-family: monospace; font-size: 0.75rem;
    }

    /* 시네마틱 타이틀 카드 — 프리미엄 세리프 + 입체적 등장 애니메이션 */
    #cinematic-title {
      position: fixed;
      bottom: 8%;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Cormorant Garamond', 'Garamond', 'Times New Roman', serif;
      pointer-events: none;
      z-index: 40;
    }
    #cinematic-title .piece-title {
      display: block;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(255, 252, 245, 0.95);
      text-shadow:
        0 0 40px rgba(139, 156, 244, 0.25),
        0 0 80px rgba(196, 168, 255, 0.12),
        0 2px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #cinematic-title .composer-name {
      display: block;
      font-family: 'Cormorant Garamond', 'Garamond', serif;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      font-weight: 400;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(200, 195, 185, 0.6);
      margin-top: 10px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s,
                  transform 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s;
    }
    #cinematic-title.visible .piece-title,
    #cinematic-title.visible .composer-name {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="loading-overlay" class="hidden">
    <span>로딩 중...</span>
  </div>

  <div id="file-overlay">
    <h1 style="margin-bottom: 32px; font-weight: 300; letter-spacing: 2px;">
      3D MIDI Visualizer
    </h1>
    <div id="drop-zone">
      MIDI 파일을 여기에 드래그하거나 클릭하세요
    </div>
    <input type="file" id="file-input" accept=".mid,.midi" style="display:none" />
    <div class="sample-buttons">
      <button class="sample-btn" data-midi="midi/pachelbel-canon.mid">
        파헬벨 캐논
      </button>
      <button class="sample-btn" data-midi="midi/summer.mid">
        Summer (기쿠지로의 여름)
      </button>
      <button class="sample-btn" data-midi="midi/fur-elise.mid">
        엘리제를 위하여
      </button>
      <button class="sample-btn" data-midi="midi/moonlight-sonata.mid">
        월광 소나타
      </button>
      <button class="sample-btn" data-midi="midi/chopin-nocturne-op9-no2.mid">
        쇼팽 녹턴 Op.9-2
      </button>
      <button class="sample-btn" data-midi="midi/mozart-alla-turca.mid">
        터키 행진곡
      </button>
    </div>
  </div>

  <div id="cinematic-title"></div>

  <div id="progress-bar-container" class="hidden">
    <div id="progress-bar"></div>
    <span id="progress-time">0:00 / 0:00</span>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
